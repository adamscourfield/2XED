services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ember
      POSTGRES_PASSWORD: ember_secret
      POSTGRES_DB: ember
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ember']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://ember:ember_secret@postgres:5432/ember
      NEXTAUTH_SECRET: your-secret-here-change-in-production
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm start"

volumes:
  postgres_data:
